<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Prospecção — Atitude e Progresso</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #1C1C1C;
      --surface:  #242424;
      --surface2: #2e2e2e;
      --border:   #383838;
      --dourado:  #D4AF37;
      --branco:   #F8F5F0;
      --cinza:    #888;
      --verde:    #064420;

      --s-nao:     #6B7280;
      --s-cont:    #3B82F6;
      --s-call:    #D4AF37;
      --s-fechou:  #22C55E;
      --s-negou:   #EF4444;
      --s-follow:  #F97316;
    }

    html { background: var(--bg); }
    body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--branco); min-height: 100vh; }

    /* ── HEADER ── */
    header {
      background: var(--verde);
      border-bottom: 2px solid var(--dourado);
      padding: 1rem 1.5rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      flex-wrap: wrap;
      position: sticky;
      top: 0;
      z-index: 50;
    }
    .header-titulo { font-size: 1rem; font-weight: 700; color: var(--dourado); letter-spacing: 1px; text-transform: uppercase; }
    .header-acoes { display: flex; gap: 0.5rem; flex-wrap: wrap; }

    /* ── BOTÕES ── */
    .btn {
      padding: 0.5rem 1rem;
      border-radius: 4px;
      font-size: 0.8rem;
      font-weight: 600;
      cursor: pointer;
      border: none;
      font-family: 'Inter', sans-serif;
      transition: opacity .15s;
    }
    .btn:hover { opacity: .85; }
    .btn-primario { background: var(--dourado); color: #111; }
    .btn-secundario { background: transparent; border: 1px solid var(--border); color: var(--branco); }
    .btn-perigo { background: #EF4444; color: #fff; }
    .btn-sm { padding: 0.3rem 0.6rem; font-size: 0.72rem; }

    /* ── STATS ── */
    .stats-bar {
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
      padding: 0.85rem 1.5rem;
      border-bottom: 1px solid var(--border);
      background: #0a3018;
    }
    .stat-chip {
      display: flex;
      align-items: center;
      gap: 0.35rem;
      padding: 0.25rem 0.6rem;
      border-radius: 20px;
      font-size: 0.72rem;
      font-weight: 600;
      background: var(--surface2);
      border: 1px solid var(--border);
    }
    .stat-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }

    /* ── FILTROS ── */
    .filtros-bar {
      padding: 0.85rem 1.5rem;
      display: flex;
      gap: 0.6rem;
      flex-wrap: wrap;
      align-items: center;
      border-bottom: 1px solid var(--border);
    }
    .search-input {
      flex: 1;
      min-width: 160px;
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--branco);
      padding: 0.45rem 0.8rem;
      border-radius: 4px;
      font-size: 0.82rem;
      font-family: 'Inter', sans-serif;
    }
    .search-input:focus { outline: none; border-color: var(--dourado); }
    .search-input::placeholder { color: var(--cinza); }

    .filtro-btn {
      padding: 0.35rem 0.75rem;
      border-radius: 20px;
      font-size: 0.72rem;
      font-weight: 600;
      cursor: pointer;
      border: 1px solid var(--border);
      background: var(--surface2);
      color: var(--cinza);
      font-family: 'Inter', sans-serif;
      transition: all .15s;
      white-space: nowrap;
    }
    .filtro-btn.ativo { color: #111; border-color: transparent; }
    .filtro-btn[data-status="todos"].ativo   { background: var(--branco); color: #111; }
    .filtro-btn[data-status="Não contatado"].ativo { background: var(--s-nao); }
    .filtro-btn[data-status="Contatado"].ativo     { background: var(--s-cont); color: #fff; }
    .filtro-btn[data-status="Call marcada"].ativo  { background: var(--s-call); }
    .filtro-btn[data-status="Fechou"].ativo        { background: var(--s-fechou); }
    .filtro-btn[data-status="Negou"].ativo         { background: var(--s-negou); color: #fff; }
    .filtro-btn[data-status="Follow-up"].ativo     { background: var(--s-follow); }

    /* ── GRID DE CARDS ── */
    .leads-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 1rem;
      padding: 1.25rem 1.5rem;
    }

    .empty-state {
      grid-column: 1/-1;
      text-align: center;
      padding: 3rem 1rem;
      color: var(--cinza);
      font-size: 0.9rem;
    }

    /* ── CARD ── */
    .lead-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-top: 3px solid var(--verde);
      border-radius: 6px;
      padding: 1rem;
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }
    .lead-card-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 0.5rem;
    }
    .lead-nome { font-size: 0.95rem; font-weight: 700; line-height: 1.3; }
    .lead-servico {
      font-size: 0.68rem;
      color: var(--cinza);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-top: 2px;
    }

    .status-badge {
      font-size: 0.65rem;
      font-weight: 700;
      padding: 0.2rem 0.5rem;
      border-radius: 20px;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .status-Não.contatado, [data-s="Não contatado"] { background: var(--s-nao); color: #fff; }
    .status-Contatado    { background: var(--s-cont);   color: #fff; }
    .status-Call.marcada { background: var(--s-call);   color: #111; }
    .status-Fechou       { background: var(--s-fechou); color: #fff; }
    .status-Negou        { background: var(--s-negou);  color: #fff; }
    .status-Follow-up    { background: var(--s-follow); color: #fff; }

    .lead-infos { display: flex; flex-direction: column; gap: 0.3rem; }
    .lead-info-row {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      font-size: 0.78rem;
      color: var(--cinza);
    }
    .lead-info-row a { color: var(--dourado); text-decoration: none; }
    .lead-info-row a:hover { text-decoration: underline; }
    .info-label { font-size: 0.65rem; text-transform: uppercase; letter-spacing: 0.5px; color: #555; min-width: 60px; }

    .lead-notas {
      font-size: 0.78rem;
      color: var(--cinza);
      background: var(--surface2);
      padding: 0.5rem 0.6rem;
      border-radius: 4px;
      border-left: 2px solid var(--verde);
      line-height: 1.5;
    }

    .lead-problema {
      font-size: 0.78rem;
      color: #aaa;
      line-height: 1.4;
    }

    .lead-acoes {
      display: flex;
      gap: 0.4rem;
      flex-wrap: wrap;
      align-items: center;
      margin-top: 0.25rem;
    }

    .status-select {
      flex: 1;
      min-width: 130px;
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--branco);
      padding: 0.3rem 0.5rem;
      border-radius: 4px;
      font-size: 0.72rem;
      font-family: 'Inter', sans-serif;
      cursor: pointer;
    }
    .status-select:focus { outline: none; border-color: var(--dourado); }

    .lead-data {
      font-size: 0.65rem;
      color: #555;
      margin-top: auto;
      padding-top: 0.25rem;
    }

    /* ── MODAL ── */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.75);
      z-index: 100;
      align-items: flex-start;
      justify-content: center;
      padding: 1rem;
      overflow-y: auto;
    }
    .modal-overlay.aberto { display: flex; }

    .modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-top: 3px solid var(--verde);
      border-radius: 8px;
      width: 100%;
      max-width: 540px;
      margin: auto;
      padding: 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 1.1rem;
    }
    .modal-titulo {
      font-size: 1rem;
      font-weight: 700;
      color: var(--dourado);
    }

    .campo-grupo { display: flex; flex-direction: column; gap: 0.35rem; }
    .campo-label { font-size: 0.75rem; font-weight: 600; color: var(--cinza); text-transform: uppercase; letter-spacing: 0.5px; }
    .campo-input, .campo-select, .campo-textarea {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--branco);
      padding: 0.55rem 0.75rem;
      border-radius: 4px;
      font-size: 0.85rem;
      font-family: 'Inter', sans-serif;
      width: 100%;
      transition: border-color .15s;
    }
    .campo-input:focus, .campo-select:focus, .campo-textarea:focus {
      outline: none;
      border-color: var(--dourado);
    }
    .campo-input::placeholder, .campo-textarea::placeholder { color: #555; }
    .campo-textarea { resize: vertical; min-height: 80px; }

    /* aviso duplicata */
    .alerta-duplicata {
      display: none;
      background: rgba(239,68,68,0.1);
      border: 1px solid rgba(239,68,68,0.4);
      border-radius: 4px;
      padding: 0.6rem 0.75rem;
      font-size: 0.78rem;
      color: #fca5a5;
      line-height: 1.5;
    }
    .alerta-duplicata.visivel { display: block; }

    .modal-acoes { display: flex; gap: 0.5rem; justify-content: flex-end; flex-wrap: wrap; }

    /* ── ABAS ── */
    .tab-nav {
      display: flex;
      background: #0a3018;
      border-bottom: 1px solid var(--border);
      padding: 0 1.5rem;
      gap: 0;
    }
    .tab-btn {
      padding: 0.75rem 1.25rem;
      font-size: 0.82rem;
      font-weight: 600;
      cursor: pointer;
      border: none;
      background: transparent;
      color: var(--cinza);
      font-family: 'Inter', sans-serif;
      border-bottom: 2px solid transparent;
      transition: all .15s;
      white-space: nowrap;
    }
    .tab-btn.ativo { color: var(--dourado); border-bottom-color: var(--dourado); }
    .tab-btn:hover:not(.ativo) { color: var(--branco); }

    /* ── CARD ENTREGA ── */
    .entregas-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 1rem;
      padding: 1.25rem 1.5rem;
    }
    .entrega-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-top: 3px solid var(--dourado);
      border-radius: 6px;
      padding: 1rem;
      display: flex;
      flex-direction: column;
      gap: 0.85rem;
    }
    .entrega-card.concluido { border-top-color: #22C55E; opacity: 0.75; }
    .entrega-card-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 0.5rem;
    }
    .entrega-nome { font-size: 0.95rem; font-weight: 700; }
    .entrega-servico { font-size: 0.68rem; color: var(--cinza); text-transform: uppercase; letter-spacing: 0.5px; margin-top: 2px; }
    .entrega-badge-ok {
      font-size: 0.65rem; font-weight: 700;
      padding: 0.2rem 0.6rem; border-radius: 20px;
      background: #22C55E; color: #fff; white-space: nowrap; flex-shrink: 0;
    }

    /* barra de progresso */
    .progresso-wrap { display: flex; flex-direction: column; gap: 0.3rem; }
    .progresso-label { font-size: 0.7rem; color: var(--cinza); display: flex; justify-content: space-between; }
    .progresso-bar { height: 6px; background: var(--surface2); border-radius: 3px; overflow: hidden; }
    .progresso-fill { height: 100%; background: var(--dourado); border-radius: 3px; transition: width .3s; }
    .entrega-card.concluido .progresso-fill { background: #22C55E; }

    /* checklist etapas */
    .etapas-lista { display: flex; flex-direction: column; gap: 0.4rem; }
    .etapa-item {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.78rem;
      color: var(--cinza);
      cursor: pointer;
      padding: 0.2rem 0;
    }
    .etapa-item input[type="checkbox"] { accent-color: var(--dourado); width: 14px; height: 14px; cursor: pointer; flex-shrink: 0; }
    .etapa-item.feita { color: #555; text-decoration: line-through; }
    .etapa-atual { color: var(--branco) !important; font-weight: 600; }

    /* notas de entrega */
    .nota-entrega {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--branco);
      padding: 0.45rem 0.6rem;
      border-radius: 4px;
      font-size: 0.78rem;
      font-family: 'Inter', sans-serif;
      resize: vertical;
      min-height: 60px;
      width: 100%;
      border-left: 2px solid var(--dourado);
    }
    .nota-entrega:focus { outline: none; border-color: var(--dourado); }
    .nota-entrega::placeholder { color: #555; }
    .nota-label { font-size: 0.65rem; color: #555; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 0.25rem; }
    .entrega-data { font-size: 0.65rem; color: #555; }

    /* ── TELA DE LOGIN ── */
    #loginScreen {
      position: fixed; inset: 0; z-index: 200;
      background: var(--verde);
      display: flex; align-items: center; justify-content: center;
      padding: 1.5rem;
    }
    .login-box {
      background: var(--surface);
      border: 1px solid var(--border);
      border-top: 3px solid var(--dourado);
      border-radius: 8px;
      padding: 2rem 1.75rem;
      width: 100%; max-width: 360px;
      display: flex; flex-direction: column; gap: 1.25rem;
    }
    .login-logo { font-size: 1.5rem; font-weight: 900; color: var(--dourado); letter-spacing: 1px; text-align: center; }
    .login-sub  { font-size: 0.8rem; color: var(--cinza); text-align: center; line-height: 1.5; }
    .login-erro {
      font-size: 0.78rem; color: #fca5a5;
      background: rgba(239,68,68,0.1);
      border: 1px solid rgba(239,68,68,0.3);
      border-radius: 4px; padding: 0.5rem 0.7rem;
      display: none;
    }
    .login-erro.visivel { display: block; }
    .login-btn { width: 100%; padding: 0.7rem; font-size: 0.9rem; font-weight: 700; }
    .lock-btn  { font-size: 0.75rem; padding: 0.3rem 0.65rem; }
    .autolock-aviso {
      font-size: 0.65rem; color: #555;
      text-align: center; margin-top: -0.5rem;
    }

    /* ── WIZARD DE DIAGNÓSTICO ── */
    .wizard-progress { display:flex; gap:4px; margin-bottom:1rem; }
    .wizard-step-dot { height:4px; flex:1; border-radius:2px; background:var(--surface2); transition:background .3s; }
    .wizard-step-dot.feito { background:var(--dourado); }
    .wizard-step-dot.atual { background:var(--branco); }

    .wizard-tema { font-size:0.68rem; text-transform:uppercase; letter-spacing:0.5px; color:var(--cinza); margin-bottom:0.35rem; }
    .wizard-pergunta { font-size:1rem; font-weight:700; color:var(--branco); line-height:1.4; margin-bottom:1.25rem; }

    .wizard-opcoes { display:flex; flex-direction:column; gap:0.5rem; }
    .wizard-opcao {
      padding:0.65rem 1rem; border-radius:4px; border:1px solid var(--border);
      background:var(--surface2); color:var(--branco); font-size:0.85rem;
      font-family:'Inter',sans-serif; cursor:pointer; text-align:left; transition:all .15s;
    }
    .wizard-opcao:hover { border-color:var(--dourado); color:var(--dourado); }
    .wizard-opcao.selecionado { border-color:var(--dourado); background:rgba(212,175,55,0.12); color:var(--dourado); font-weight:600; }

    .wizard-nav { display:flex; gap:0.5rem; justify-content:space-between; margin-top:1.25rem; }

    /* ── RESUMO DO DIAGNÓSTICO ── */
    .resumo-grid { display:grid; grid-template-columns:1fr 1fr; gap:0.5rem; }
    .resumo-card { border-radius:4px; padding:0.65rem 0.75rem; border:1px solid var(--border); }
    .resumo-card.bom     { border-left:3px solid #22C55E; background:rgba(34,197,94,0.06); }
    .resumo-card.atencao { border-left:3px solid #F59E0B; background:rgba(245,158,11,0.06); }
    .resumo-card.critico { border-left:3px solid #EF4444; background:rgba(239,68,68,0.06); }
    .resumo-card-titulo  { font-size:0.68rem; text-transform:uppercase; letter-spacing:0.5px; color:var(--cinza); margin-bottom:0.2rem; }
    .resumo-card-valor   { font-size:0.8rem; font-weight:600; }
    .resumo-card.bom     .resumo-card-valor { color:#22C55E; }
    .resumo-card.atencao .resumo-card-valor { color:#F59E0B; }
    .resumo-card.critico .resumo-card-valor { color:#EF4444; }

    .resumo-oportunidade {
      background:rgba(212,175,55,0.1); border:1px solid rgba(212,175,55,0.3);
      border-radius:4px; padding:0.75rem 1rem; margin-top:0.75rem;
    }
    .resumo-oportunidade-label { font-size:0.65rem; text-transform:uppercase; letter-spacing:0.5px; color:var(--dourado); margin-bottom:0.25rem; }
    .resumo-oportunidade-valor { font-size:0.95rem; font-weight:700; color:var(--branco); }
    .resumo-concorrente { font-size:0.75rem; color:var(--cinza); margin-top:0.3rem; }

    .resumo-acoes { display:flex; flex-direction:column; gap:0.5rem; margin-top:1rem; }
    .btn-fechou {
      background:#22C55E; color:#fff; border:none; padding:0.6rem 1rem; border-radius:4px;
      font-size:0.82rem; font-weight:700; font-family:'Inter',sans-serif; cursor:pointer; transition:opacity .15s;
    }
    .btn-fechou:hover { opacity:0.85; }

    .badge-analise {
      font-size:0.62rem; font-weight:700; padding:0.15rem 0.45rem; border-radius:10px;
      background:rgba(212,175,55,0.15); color:var(--dourado); border:1px solid rgba(212,175,55,0.3);
    }

    /* ── RESPONSIVO ── */
    @media (max-width: 600px) {
      header { padding: 0.75rem 1rem; }
      .tab-nav { padding: 0 1rem; }
      .stats-bar, .filtros-bar { padding: 0.75rem 1rem; }
      .leads-grid, .entregas-grid { padding: 1rem; gap: 0.75rem; }
      .modal { padding: 1.1rem; }
    }
  </style>
</head>
<body>

  <!-- HEADER -->
  <header>
    <div class="header-titulo">📋 Prospecção</div>
    <div class="header-acoes">
      <div id="headerDinamico" style="display:flex;gap:0.5rem;flex-wrap:wrap;">
        <button class="btn btn-secundario" onclick="exportarCSV()">Exportar CSV</button>
        <button class="btn btn-primario" onclick="abrirModal()">+ Novo Lead</button>
      </div>
      <button class="btn btn-secundario lock-btn" onclick="travar()" title="Travar">🔒</button>
    </div>
  </header>

  <!-- ABAS -->
  <nav class="tab-nav">
    <button class="tab-btn ativo" onclick="switchTab('prospeccao', this)">📋 Prospecção</button>
    <button class="tab-btn" onclick="switchTab('entregas', this)">📦 Entregas</button>
  </nav>

  <!-- SEÇÃO PROSPECÇÃO -->
  <div id="secProspeccao">
    <div class="stats-bar" id="statsBar"></div>
    <div class="filtros-bar">
      <input class="search-input" type="text" id="searchInput" placeholder="Buscar por nome..." oninput="renderLeads()" />
      <button class="filtro-btn ativo" data-status="todos" onclick="setFiltro('todos', this)">Todos</button>
      <button class="filtro-btn" data-status="Não contatado" onclick="setFiltro('Não contatado', this)">Não contatado</button>
      <button class="filtro-btn" data-status="Contatado" onclick="setFiltro('Contatado', this)">Contatado</button>
      <button class="filtro-btn" data-status="Call marcada" onclick="setFiltro('Call marcada', this)">Call marcada</button>
      <button class="filtro-btn" data-status="Fechou" onclick="setFiltro('Fechou', this)">Fechou</button>
      <button class="filtro-btn" data-status="Negou" onclick="setFiltro('Negou', this)">Negou</button>
      <button class="filtro-btn" data-status="Follow-up" onclick="setFiltro('Follow-up', this)">Follow-up</button>
    </div>
    <div class="leads-grid" id="leadsGrid"></div>
  </div>

  <!-- SEÇÃO ENTREGAS -->
  <div id="secEntregas" style="display:none">
    <div class="entregas-grid" id="entregasGrid"></div>
  </div>

  <!-- MODAL -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal">
      <div class="modal-titulo" id="modalTitulo">Novo Lead</div>
      <input type="hidden" id="leadId" />

      <div class="campo-grupo">
        <label class="campo-label">Nome do negócio *</label>
        <input class="campo-input" id="fNome" type="text" placeholder="Ex: Barbearia do João" oninput="verificarDuplicata()" />
        <div class="alerta-duplicata" id="alertaDuplicata"></div>
      </div>

      <div class="campo-grupo">
        <label class="campo-label">Telefone / WhatsApp</label>
        <input class="campo-input" id="fTelefone" type="text" placeholder="+55 11 99999-9999" oninput="verificarDuplicataTel()" />
        <div class="alerta-duplicata" id="alertaDuplicataTel"></div>
      </div>

      <div class="campo-grupo">
        <label class="campo-label">Email</label>
        <input class="campo-input" id="fEmail" type="email" placeholder="contato@empresa.com" />

      <div class="campo-grupo">

        <input class="campo-input" id="fCidade" type="text" placeholder="Ex: Toronto, Vancouver, São Paulo..." />

        <label class="campo-label">Site atual (se tiver)</label>
        <input class="campo-input" id="fSite" type="url" placeholder="https://..." />

      <div class="campo-grupo">
        <label class="campo-label">Problema identificado</label>

      <div class="campo-grupo">
        <label class="campo-label">Serviço a oferecer</label>
        <select class="campo-select" id="fServico">
          <option value="Presença Digital">Presença Digital</option>
          <option value="Funil de Vendas">Funil de Vendas</option>
          <option value="Refazer Página">Refazer Página</option>
          <option value="Análise de LP/Página de Vendas">Análise de LP / Página de Vendas</option>
          <option value="Outro">Outro</option>
        </select>
      </div>

      <div class="campo-grupo">
        <label class="campo-label">Status</label>
        <select class="campo-select" id="fStatus">
          <option value="Não contatado">Não contatado</option>
          <option value="Contatado">Contatado</option>
          <option value="Call marcada">Call marcada</option>
          <option value="Fechou">Fechou</option>
          <option value="Negou">Negou</option>
          <option value="Follow-up">Follow-up</option>
        </select>
      </div>

      <div class="campo-grupo">
        <label class="campo-label">Notas</label>
        <textarea class="campo-textarea" id="fNotas" placeholder="Observações, próximos passos, contexto..."></textarea>
      </div>

      <div class="modal-acoes">
        <button class="btn btn-secundario" onclick="fecharModal()">Cancelar</button>
        <button class="btn btn-primario" onclick="salvarLead()">Salvar</button>
      </div>
    </div>
  </div>

  <!-- MODAL DIAGNÓSTICO -->
  <div class="modal-overlay" id="wizardOverlay">
    <div class="modal" style="max-width:560px">
      <div id="wizardConteudo"></div>
    </div>
  </div>

  <!-- TELA DE LOGIN -->
  <div id="loginScreen">
    <div class="login-box">
      <div class="login-logo">🔐 Prospecção</div>
      <div class="login-sub" id="loginSub">Digite sua senha para acessar</div>
      <input class="campo-input" type="password" id="senhaInput" placeholder="Senha"
        onkeydown="if(event.key==='Enter') entrar()" autocomplete="current-password" />
      <input class="campo-input" type="password" id="senhaConfirm" placeholder="Confirmar senha"
        style="display:none" onkeydown="if(event.key==='Enter') entrar()" />
      <div class="login-erro" id="loginErro"></div>
      <button class="btn btn-primario login-btn" onclick="entrar()">Entrar</button>
      <div class="autolock-aviso">Trava automaticamente após 15 min de inatividade</div>
    </div>
  </div>

  <script>
    // ══════════════════════════════════════════════════════════════════════════
    // SEGURANÇA — SHA-256 hash + PBKDF2 → AES-GCM + auto-lock 15min
    // ══════════════════════════════════════════════════════════════════════════

    let cryptoKey    = null;   // chave AES em memória (limpa ao travar)
    let leadsCache   = [];
    let entregasCache = [];
    let ultimaAtividade = Date.now();
    const LOCK_MS = 15 * 60 * 1000; // 15 minutos

    const enc = new TextEncoder();
    const dec = new TextDecoder();

    function b64(buf) { return btoa(String.fromCharCode(...new Uint8Array(buf))); }
    function deb64(s) { return Uint8Array.from(atob(s), c => c.charCodeAt(0)); }

    async function hashSenha(senha) {
      const buf = await crypto.subtle.digest('SHA-256', enc.encode(senha));
      return [...new Uint8Array(buf)].map(b => b.toString(16).padStart(2,'0')).join('');
    }

    async function derivarChave(senha, salt) {
      const base = await crypto.subtle.importKey('raw', enc.encode(senha), 'PBKDF2', false, ['deriveKey']);
      return crypto.subtle.deriveKey(
        { name: 'PBKDF2', salt, iterations: 200000, hash: 'SHA-256' },
        base,
        { name: 'AES-GCM', length: 256 },
        false, ['encrypt', 'decrypt']
      );
    }

    async function encriptar(obj) {
      const iv   = crypto.getRandomValues(new Uint8Array(12));
      const data = enc.encode(JSON.stringify(obj));
      const buf  = await crypto.subtle.encrypt({ name: 'AES-GCM', iv }, cryptoKey, data);
      // armazena iv + ciphertext como base64
      const combined = new Uint8Array(12 + buf.byteLength);
      combined.set(iv, 0);
      combined.set(new Uint8Array(buf), 12);
      return b64(combined.buffer);
    }

    async function decriptar(b64str) {
      const combined = deb64(b64str);
      const iv  = combined.slice(0, 12);
      const buf = combined.slice(12);
      const data = await crypto.subtle.decrypt({ name: 'AES-GCM', iv }, cryptoKey, buf);
      return JSON.parse(dec.decode(data));
    }

    // ── FLUXO DE LOGIN ────────────────────────────────────────────────────────
    async function inicializar() {
      const temSenha = localStorage.getItem('auth_hash');
      if (!temSenha) {
        // primeira vez — pede criação de senha
        document.getElementById('loginSub').textContent = 'Crie uma senha para proteger seus dados';
        document.getElementById('senhaConfirm').style.display = '';
        document.getElementById('senhaInput').placeholder = 'Nova senha';
      }
      document.getElementById('senhaInput').focus();
    }

    async function entrar() {
      const senha = document.getElementById('senhaInput').value;
      const erro  = document.getElementById('loginErro');
      erro.classList.remove('visivel');

      if (!senha || senha.length < 4) {
        erro.textContent = 'Senha deve ter ao menos 4 caracteres.';
        erro.classList.add('visivel'); return;
      }

      const temSenha = localStorage.getItem('auth_hash');

      if (!temSenha) {
        // definir senha pela primeira vez
        const confirma = document.getElementById('senhaConfirm').value;
        if (senha !== confirma) {
          erro.textContent = 'As senhas não coincidem.';
          erro.classList.add('visivel'); return;
        }
        const salt = crypto.getRandomValues(new Uint8Array(16));
        localStorage.setItem('auth_salt', b64(salt.buffer));
        localStorage.setItem('auth_hash', await hashSenha(senha));
        cryptoKey = await derivarChave(senha, salt);
        leadsCache    = [];
        entregasCache = [];
        await persistir();
      } else {
        // verificar senha existente
        const hash = await hashSenha(senha);
        if (hash !== localStorage.getItem('auth_hash')) {
          erro.textContent = 'Senha incorreta.';
          erro.classList.add('visivel');
          document.getElementById('senhaInput').value = '';
          document.getElementById('senhaInput').focus();
          return;
        }
        const salt = deb64(localStorage.getItem('auth_salt'));
        cryptoKey = await derivarChave(senha, salt);
        // descriptografar dados
        try {
          const leadsEnc    = localStorage.getItem('leads_enc');
          const entregasEnc = localStorage.getItem('entregas_enc');
          leadsCache    = leadsEnc    ? await decriptar(leadsEnc)    : [];
          entregasCache = entregasEnc ? await decriptar(entregasEnc) : [];
        } catch {
          leadsCache = []; entregasCache = [];
        }
      }

      // desbloquear
      document.getElementById('senhaInput').value = '';
      if (document.getElementById('senhaConfirm')) document.getElementById('senhaConfirm').value = '';
      document.getElementById('loginScreen').style.display = 'none';
      ultimaAtividade = Date.now();
      renderLeads();
      renderStats();
    }

    function travar() {
      cryptoKey     = null;
      leadsCache    = [];
      entregasCache = [];
      document.getElementById('loginScreen').style.display = 'flex';
      document.getElementById('loginSub').textContent = 'Digite sua senha para acessar';
      document.getElementById('senhaConfirm').style.display = 'none';
      document.getElementById('senhaInput').placeholder = 'Senha';
      document.getElementById('loginErro').classList.remove('visivel');
      document.getElementById('senhaInput').value = '';
      document.getElementById('senhaInput').focus();
    }

    // ── STORAGE ENCRIPTADO ────────────────────────────────────────────────────
    function getLeads()    { return leadsCache; }
    function getEntregas() { return entregasCache; }

    function setLeads(dados) {
      leadsCache = dados;
      persistir();
    }
    function setEntregas(dados) {
      entregasCache = dados;
      persistir();
    }

    async function persistir() {
      if (!cryptoKey) return;
      localStorage.setItem('leads_enc',    await encriptar(leadsCache));
      localStorage.setItem('entregas_enc', await encriptar(entregasCache));
    }

    // ── AUTO-LOCK ─────────────────────────────────────────────────────────────
    function resetarAtividade() { ultimaAtividade = Date.now(); }
    document.addEventListener('click',   resetarAtividade);
    document.addEventListener('keydown', resetarAtividade);
    setInterval(() => {
      if (cryptoKey && Date.now() - ultimaAtividade > LOCK_MS) travar();
    }, 30000);

    // ══════════════════════════════════════════════════════════════════════════

    const ETAPAS = {
      'Presença Digital': ['Briefing', 'Domínio / Hospedagem', 'Criação da página', 'GMB configurado', 'Revisão com cliente', 'Publicado', 'Suporte pós-entrega'],
      'Funil de Vendas':  ['Briefing', 'Copy das páginas', 'Criação das páginas', 'Sequência de email', 'Integração com checkout', 'Testes', 'Entregue', 'Suporte 30 dias'],
      'Refazer Página':   ['Briefing', 'Referências aprovadas', 'Criação', 'Revisão', 'Publicado', 'Suporte'],
      'Outro':            ['Briefing', 'Em andamento', 'Revisão', 'Entregue'],
    };

    const STATUS_CORES = {
      'Não contatado': '#6B7280',
      'Contatado':     '#3B82F6',
      'Call marcada':  '#D4AF37',
      'Fechou':        '#22C55E',
      'Negou':         '#EF4444',
      'Follow-up':     '#F97316',
    };
    const STATUS_TEXT = {
      'Call marcada': '#111',
      'Fechou':       '#fff',
      'Não contatado':'#fff',
      'Contatado':    '#fff',
      'Negou':        '#fff',
      'Follow-up':    '#fff',
    };

    let filtroAtivo = 'todos';

    function getLeads() {
      return JSON.parse(localStorage.getItem('leads_prospeccao') || '[]');
    }
    function setLeads(leads) {
      localStorage.setItem('leads_prospeccao', JSON.stringify(leads));
    }

    // ── STATS ────────────────────────────────────────────────────────────────
    function renderStats() {
      const leads = getLeads();
      const bar = document.getElementById('statsBar');
      const contagem = { total: leads.length };
      Object.keys(STATUS_CORES).forEach(s => { contagem[s] = 0; });
      leads.forEach(l => { if (contagem[l.status] !== undefined) contagem[l.status]++; });

      let html = `<div class="stat-chip"><span class="stat-dot" style="background:#aaa"></span>${contagem.total} total</div>`;
      Object.keys(STATUS_CORES).forEach(s => {
        if (contagem[s] > 0) {
          html += `<div class="stat-chip"><span class="stat-dot" style="background:${STATUS_CORES[s]}"></span>${contagem[s]} ${s}</div>`;
        }
      });
      bar.innerHTML = html;
    }

    // ── FILTRO ───────────────────────────────────────────────────────────────
    function setFiltro(status, btn) {
      filtroAtivo = status;
      document.querySelectorAll('.filtro-btn').forEach(b => b.classList.remove('ativo'));
      btn.classList.add('ativo');
      renderLeads();
    }

    // ── RENDER LEADS ─────────────────────────────────────────────────────────
    function renderLeads() {
      const leads = getLeads();
      const busca = document.getElementById('searchInput').value.toLowerCase().trim();
      const grid = document.getElementById('leadsGrid');

      let filtrados = leads.filter(l => {
        const matchFiltro = filtroAtivo === 'todos' || l.status === filtroAtivo;
        const matchBusca  = !busca || l.nome.toLowerCase().includes(busca);
        return matchFiltro && matchBusca;
      });

      if (filtrados.length === 0) {
        grid.innerHTML = `<div class="empty-state">Nenhum lead encontrado.</div>`;
        return;
      }

      grid.innerHTML = filtrados.map(lead => cardHTML(lead)).join('');
      renderStats();
    }

    function cardHTML(lead) {
      const cor  = STATUS_CORES[lead.status] || '#6B7280';
      const txt  = STATUS_TEXT[lead.status]  || '#fff';
      const data = new Date(lead.criado).toLocaleDateString('pt-BR');

      const tel = lead.telefone
        ? `<div class="lead-info-row"><span class="info-label">Fone</span><a href="https://wa.me/${lead.telefone.replace(/\D/g,'')}" target="_blank">${lead.telefone}</a></div>`
        : '';
      const email = lead.email
        ? `<div class="lead-info-row"><span class="info-label">Email</span><a href="mailto:${lead.email}">${lead.email}</a></div>`
        : '';
      const insta = lead.instagram
        ? `<div class="lead-info-row"><span class="info-label">Insta</span><a href="https://instagram.com/${lead.instagram.replace('@','')}" target="_blank">${lead.instagram}</a></div>`
        : '';
      const site = lead.site
        ? `<div class="lead-info-row"><span class="info-label">Site</span><a href="${lead.site}" target="_blank">${lead.site}</a></div>`
        : '';
      const problema = lead.problema
        ? `<div class="lead-problema">⚠️ ${lead.problema}</div>` : '';
      const notas = lead.notas
        ? `<div class="lead-notas">${lead.notas}</div>` : '';

      const statusOptions = Object.keys(STATUS_CORES).map(s =>
        `<option value="${s}" ${s === lead.status ? 'selected' : ''}>${s}</option>`
      ).join('');

      return `
        <div class="lead-card" id="card-${lead.id}">
          <div class="lead-card-top">
            <div>
              <div class="lead-nome">${lead.nome}</div>
              <div class="lead-servico">${lead.servico}</div>
            </div>
            <span class="status-badge" style="background:${cor};color:${txt}">${lead.status}</span>
          </div>
          <div class="lead-infos">${tel}${email}${insta}${site}</div>
          ${problema}
          ${notas}
          <div class="lead-acoes">
            <select class="status-select" onchange="mudarStatus('${lead.id}', this.value)">${statusOptions}</select>
            <button class="btn btn-secundario btn-sm" onclick="editarLead('${lead.id}')">Editar</button>
            <button class="btn btn-perigo btn-sm" onclick="deletarLead('${lead.id}')">✕</button>
            <button class="btn btn-secundario btn-sm" onclick="iniciarAnalise('${lead.id}')">
              ${lead.diagnostico?.completo ? '📊 Ver Análise' : '🔍 Iniciar Análise'}
            </button>
          </div>
          <div class="lead-data">Cadastrado em ${data}</div>
        </div>`;
    }

    // ── ABAS ─────────────────────────────────────────────────────────────────
    function switchTab(tab, btn) {
      document.getElementById('secProspeccao').style.display = tab === 'prospeccao' ? '' : 'none';
      document.getElementById('secEntregas').style.display   = tab === 'entregas'   ? '' : 'none';
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('ativo'));
      btn.classList.add('ativo');
      const din = document.getElementById('headerDinamico');
      if (tab === 'prospeccao') {
        din.innerHTML = `<button class="btn btn-secundario" onclick="exportarCSV()">Exportar CSV</button>
          <button class="btn btn-primario" onclick="abrirModal()">+ Novo Lead</button>`;
      } else {
        din.innerHTML = '';
        renderEntregas();
      }
    }

    // ── ENTREGAS — STORAGE ────────────────────────────────────────────────────
    function getEntregas() { return JSON.parse(localStorage.getItem('entregas_prospeccao') || '[]'); }
    function setEntregas(e) { localStorage.setItem('entregas_prospeccao', JSON.stringify(e)); }

    function criarEntrega(lead) {
      const etapas = (ETAPAS[lead.servico] || ETAPAS['Outro']).map(nome => ({ nome, feita: false }));
      return {
        id:       crypto.randomUUID(),
        leadId:   lead.id,
        nome:     lead.nome,
        servico:  lead.servico,
        etapas,
        notas:    '',
        inicio:   new Date().toISOString(),
      };
    }

    function verificarECriarEntrega(leadId) {
      const lead = getLeads().find(l => l.id === leadId);
      if (!lead || lead.status !== 'Fechou') return;
      const entregas = getEntregas();
      if (entregas.find(e => e.leadId === leadId)) return; // já existe
      entregas.unshift(criarEntrega(lead));
      setEntregas(entregas);
    }

    // ── ENTREGAS — RENDER ─────────────────────────────────────────────────────
    function renderEntregas() {
      const entregas = getEntregas();
      const grid = document.getElementById('entregasGrid');
      if (entregas.length === 0) {
        grid.innerHTML = `<div class="empty-state">Nenhuma entrega ainda.<br>Leads com status "Fechou" aparecem aqui automaticamente.</div>`;
        return;
      }
      grid.innerHTML = entregas.map(e => cardEntregaHTML(e)).join('');
    }

    function cardEntregaHTML(e) {
      const total   = e.etapas.length;
      const feitas  = e.etapas.filter(et => et.feita).length;
      const pct     = Math.round((feitas / total) * 100);
      const concluido = feitas === total;
      const proxima = e.etapas.find(et => !et.feita);
      const inicio  = new Date(e.inicio).toLocaleDateString('pt-BR');

      const etapasHTML = e.etapas.map((et, i) => {
        const isProx = !et.feita && et === proxima;
        return `<label class="etapa-item ${et.feita ? 'feita' : ''} ${isProx ? 'etapa-atual' : ''}">
          <input type="checkbox" ${et.feita ? 'checked' : ''} onchange="toggleEtapa('${e.id}', ${i})" />
          ${et.nome}
        </label>`;
      }).join('');

      return `
        <div class="entrega-card ${concluido ? 'concluido' : ''}" id="entrega-${e.id}">
          <div class="entrega-card-top">
            <div>
              <div class="entrega-nome">${e.nome}</div>
              <div class="entrega-servico">${e.servico}</div>
            </div>
            ${concluido ? '<span class="entrega-badge-ok">✓ Concluído</span>' : ''}
          </div>
          <div class="progresso-wrap">
            <div class="progresso-label">
              <span>${proxima ? 'Próximo: ' + proxima.nome : '✓ Todas as etapas concluídas'}</span>
              <span>${feitas}/${total}</span>
            </div>
            <div class="progresso-bar"><div class="progresso-fill" style="width:${pct}%"></div></div>
          </div>
          <div class="etapas-lista">${etapasHTML}</div>
          <div>
            <div class="nota-label">Notas de entrega</div>
            <textarea class="nota-entrega" placeholder="Atualizações, links, senhas, pendências..."
              onblur="salvarNotaEntrega('${e.id}', this.value)">${e.notas || ''}</textarea>
          </div>
          <div style="display:flex;align-items:center;justify-content:space-between;">
            <div class="entrega-data">Cliente desde ${inicio}</div>
            <button class="btn btn-perigo btn-sm" onclick="deletarEntrega('${e.id}')">✕ Remover</button>
          </div>
        </div>`;
    }

    function toggleEtapa(entregaId, idx) {
      const entregas = getEntregas();
      const e = entregas.find(e => e.id === entregaId);
      if (!e) return;
      e.etapas[idx].feita = !e.etapas[idx].feita;
      setEntregas(entregas);
      renderEntregas();
    }

    function deletarEntrega(id) {
      const e = getEntregas().find(e => e.id === id);
      if (!e) return;
      if (!confirm(`Remover "${e.nome}" das entregas? Os dados de prospecção não são afetados.`)) return;
      setEntregas(getEntregas().filter(e => e.id !== id));
      renderEntregas();
    }

    function salvarNotaEntrega(entregaId, nota) {
      const entregas = getEntregas();
      const e = entregas.find(e => e.id === entregaId);
      if (!e) return;
      e.notas = nota;
      setEntregas(entregas);
    }

    // ── MUDAR STATUS ─────────────────────────────────────────────────────────
    function mudarStatus(id, novoStatus) {
      const leads = getLeads();
      const idx = leads.findIndex(l => l.id === id);
      if (idx === -1) return;
      leads[idx].status = novoStatus;
      setLeads(leads);
      if (novoStatus === 'Fechou') verificarECriarEntrega(id);
      renderLeads();
    }

    // ── MODAL ────────────────────────────────────────────────────────────────
    function abrirModal(lead = null) {
      document.getElementById('modalOverlay').classList.add('aberto');
      document.getElementById('alertaDuplicata').classList.remove('visivel');
      document.getElementById('alertaDuplicataTel').classList.remove('visivel');

      if (lead) {
        document.getElementById('modalTitulo').textContent = 'Editar Lead';
        document.getElementById('leadId').value    = lead.id;
        document.getElementById('fNome').value     = lead.nome;
        document.getElementById('fTelefone').value = lead.telefone || '';
        document.getElementById('fEmail').value    = lead.email || '';
        document.getElementById('fInstagram').value= lead.instagram || '';
        document.getElementById('fCidade').value   = lead.cidade || '';
        document.getElementById('fSite').value     = lead.site || '';
        document.getElementById('fProblema').value = lead.problema || '';
        document.getElementById('fServico').value  = lead.servico;
        document.getElementById('fStatus').value   = lead.status;
        document.getElementById('fNotas').value    = lead.notas || '';
      } else {
        document.getElementById('modalTitulo').textContent = 'Novo Lead';
        document.getElementById('leadId').value    = '';
        document.getElementById('fNome').value     = '';
        document.getElementById('fTelefone').value = '';
        document.getElementById('fEmail').value    = '';
        document.getElementById('fInstagram').value= '';
        document.getElementById('fCidade').value   = '';
        document.getElementById('fSite').value     = '';
        document.getElementById('fProblema').value = '';
        document.getElementById('fServico').value  = 'Presença Digital';
        document.getElementById('fStatus').value   = 'Não contatado';
        document.getElementById('fNotas').value    = '';
      }
      document.getElementById('fNome').focus();
    }

    function fecharModal() {
      document.getElementById('modalOverlay').classList.remove('aberto');
    }

    // fecha ao clicar fora do modal
    document.getElementById('modalOverlay').addEventListener('click', function(e) {
      if (e.target === this) fecharModal();
    });

    // ── DETECÇÃO DE DUPLICATA ─────────────────────────────────────────────────
    function similaridade(a, b) {
      a = a.toLowerCase().trim();
      b = b.toLowerCase().trim();
      if (a === b) return 1;
      if (b.includes(a) || a.includes(b)) return 0.9;
      // Jaccard simples por palavras
      const wa = new Set(a.split(/\s+/));
      const wb = new Set(b.split(/\s+/));
      const inter = [...wa].filter(w => wb.has(w)).length;
      const uniao = new Set([...wa, ...wb]).size;
      return inter / uniao;
    }

    function verificarDuplicata() {
      const nome = document.getElementById('fNome').value.trim();
      const idAtual = document.getElementById('leadId').value;
      const alerta = document.getElementById('alertaDuplicata');
      if (nome.length < 3) { alerta.classList.remove('visivel'); return; }

      const leads = getLeads().filter(l => l.id !== idAtual);
      const match = leads.find(l => similaridade(nome, l.nome) >= 0.7);
      if (match) {
        const data = new Date(match.criado).toLocaleDateString('pt-BR');
        alerta.innerHTML = `⚠️ Lead parecido já existe: <strong>${match.nome}</strong> — cadastrado em ${data}, status: <strong>${match.status}</strong>`;
        alerta.classList.add('visivel');
      } else {
        alerta.classList.remove('visivel');
      }
    }

    function verificarDuplicataTel() {
      const tel = document.getElementById('fTelefone').value.replace(/\D/g,'');
      const idAtual = document.getElementById('leadId').value;
      const alerta = document.getElementById('alertaDuplicataTel');
      if (tel.length < 8) { alerta.classList.remove('visivel'); return; }

      const leads = getLeads().filter(l => l.id !== idAtual);
      const match = leads.find(l => l.telefone && l.telefone.replace(/\D/g,'') === tel);
      if (match) {
        const data = new Date(match.criado).toLocaleDateString('pt-BR');
        alerta.innerHTML = `⚠️ Esse telefone já está no lead: <strong>${match.nome}</strong> — ${data}, status: <strong>${match.status}</strong>`;
        alerta.classList.add('visivel');
      } else {
        alerta.classList.remove('visivel');
      }
    }

    // ── SALVAR LEAD ───────────────────────────────────────────────────────────
    function salvarLead() {
      const nome = document.getElementById('fNome').value.trim();
      if (!nome) { alert('Nome do negócio é obrigatório.'); return; }

      const id = document.getElementById('leadId').value;
      const leads = getLeads();

      const dado = {
        id:        id || crypto.randomUUID(),
        nome,
        telefone:  document.getElementById('fTelefone').value.trim(),
        email:     document.getElementById('fEmail').value.trim(),
        instagram: document.getElementById('fInstagram').value.trim(),
        cidade:    document.getElementById('fCidade').value.trim(),
        site:      document.getElementById('fSite').value.trim(),
        problema:  document.getElementById('fProblema').value.trim(),
        servico:   document.getElementById('fServico').value,
        status:    document.getElementById('fStatus').value,
        notas:     document.getElementById('fNotas').value.trim(),
        criado:    id ? (leads.find(l => l.id === id)?.criado || new Date().toISOString()) : new Date().toISOString(),
      };

      if (id) {
        const idx = leads.findIndex(l => l.id === id);
        leads[idx] = dado;
      } else {
        leads.unshift(dado);
      }

      setLeads(leads);
      if (dado.status === 'Fechou') verificarECriarEntrega(dado.id);
      fecharModal();
      renderLeads();
    }

    // ── EDITAR ────────────────────────────────────────────────────────────────
    function editarLead(id) {
      const lead = getLeads().find(l => l.id === id);
      if (lead) abrirModal(lead);
    }

    // ── DELETAR ───────────────────────────────────────────────────────────────
    function deletarLead(id) {
      const lead = getLeads().find(l => l.id === id);
      if (!lead) return;
      if (!confirm(`Deletar "${lead.nome}"? Essa ação não tem volta.`)) return;
      setLeads(getLeads().filter(l => l.id !== id));
      renderLeads();
    }

    // ── EXPORTAR CSV ─────────────────────────────────────────────────────────
    function exportarCSV() {
      const leads = getLeads();
      if (leads.length === 0) { alert('Nenhum lead pra exportar.'); return; }

      const cols = ['Nome', 'Telefone', 'Email', 'Instagram', 'Site', 'Problema', 'Serviço', 'Status', 'Notas', 'Cadastrado em'];
      const linhas = leads.map(l => [
        l.nome, l.telefone, l.email, l.instagram, l.site, l.problema,
        l.servico, l.status, l.notas,
        new Date(l.criado).toLocaleDateString('pt-BR')
      ].map(v => `"${(v||'').replace(/"/g,'""')}"`).join(','));

      const csv = [cols.join(','), ...linhas].join('\n');
      const blob = new Blob(['﻿' + csv], { type: 'text/csv;charset=utf-8;' });
      const url  = URL.createObjectURL(blob);
      const a    = document.createElement('a');
      a.href = url;
      a.download = `leads-prospeccao-${new Date().toISOString().slice(0,10)}.csv`;
      a.click();
      URL.revokeObjectURL(url);
    }

    function iniciarAnalise(leadId) {
      const lead = getLeads().find(l => l.id === leadId);
      if (!lead) return;
      const isLP = lead.servico === 'Análise de LP/Página de Vendas';
      const respostas = lead.diagnostico?.respostas || {};
      wz = {
        leadId,
        stepIdx: 0,
        respostas,
        passos: isLP ? passosFiltradosLP(respostas) : passosFiltrados(respostas),
        tipo: isLP ? 'lp' : 'local',
      };
      document.getElementById('wizardOverlay').classList.add('aberto');
      if (lead.diagnostico?.completo) {
        if (isLP) renderLPResumo(lead);
        else renderResumo(lead);
        return;
      }
      renderStep();
    }

    function fecharWizard() { document.getElementById('wizardOverlay').classList.remove('aberto'); }
    document.getElementById('wizardOverlay').addEventListener('click', function(e) { if (e.target===this) fecharWizard(); });

    function renderStep() {
      const step = wz.passos[wz.stepIdx];
      const total = wz.passos.length;
      const lead  = getLeads().find(l => l.id === wz.leadId);
      const r     = wz.respostas;
      const val   = r[step.id] || '';

      const dots = wz.passos.map((_,i) =>
        `<div class="wizard-step-dot ${i < wz.stepIdx ? 'feito' : i === wz.stepIdx ? 'atual' : ''}"></div>`
      ).join('');

      let pergunta = step.pergunta
        .replace('[tipo]',   lead?.servico || 'negócio')
        .replace('[cidade]', lead?.cidade  || 'sua cidade');

      let campo = '';
      if (step.tipo === 'opcoes') {
        campo = `<div class="wizard-opcoes">` +
          step.opcoes.map(op =>
            `<button class="wizard-opcao ${val===op?'selecionado':''}" onclick="selecionarOpcao('${step.id}','${op.replace(/'/g,"\\'").replace(/"/g,'&quot;')}',this)">${op}</button>`
          ).join('') + `</div>`;
      } else if (step.tipo === 'numero' || step.tipo === 'numero_decimal') {
        const stepAttr = step.tipo === 'numero_decimal' ? 'step="0.1"' : 'step="1"';
        campo = `<input class="campo-input" type="number" ${stepAttr} min="0" id="wzInput"
          placeholder="${step.placeholder}" value="${val}"
          onkeydown="if(event.key==='Enter')proximaEtapa()" style="max-width:220px" />`;
      } else if (step.tipo === 'texto') {
        campo = `<input class="campo-input" type="text" id="wzInput"
          placeholder="${step.placeholder}" value="${val}"
          onkeydown="if(event.key==='Enter')proximaEtapa()" />`;
      } else {
        campo = `<textarea class="campo-textarea" id="wzInput"
          placeholder="${step.placeholder}">${val}</textarea>`;
      }

      const opcional = step.opcional ? ' <span style="color:var(--cinza);font-size:0.7rem">(opcional)</span>' : '';
      const isUltimo = wz.stepIdx === total - 1;

      document.getElementById('wizardConteudo').innerHTML = `
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:0.75rem">
          <div class="modal-titulo">🔍 Diagnóstico</div>
          <button class="btn btn-secundario btn-sm" onclick="fecharWizard()">✕</button>
        </div>
        <div style="font-size:0.75rem;color:var(--cinza);margin-bottom:0.6rem">${lead?.nome || ''}</div>
        <div class="wizard-progress">${dots}</div>
        <div style="font-size:0.65rem;color:var(--cinza);margin-bottom:1rem">${wz.stepIdx+1} de ${total}</div>
        <div class="wizard-tema">${step.tema}</div>
        <div class="wizard-pergunta">${pergunta}${opcional}</div>
        ${campo}
        <div class="wizard-nav">
          <button class="btn btn-secundario" onclick="etapaAnterior()" ${wz.stepIdx>0?'':'style="visibility:hidden"'}>← Voltar</button>
          <button class="btn btn-primario" onclick="proximaEtapa()">${isUltimo ? 'Ver Resumo →' : 'Próximo →'}</button>
        </div>`;

      if (step.tipo !== 'opcoes') setTimeout(() => document.getElementById('wzInput')?.focus(), 80);
    }

    function selecionarOpcao(stepId, valor, btn) {
      btn.closest('.wizard-opcoes').querySelectorAll('.wizard-opcao').forEach(b => b.classList.remove('selecionado'));
      btn.classList.add('selecionado');
      wz.respostas[stepId] = valor;
      setTimeout(() => proximaEtapa(), 350);
    }

    function proximaEtapa() {
      const step = wz.passos[wz.stepIdx];
      const r    = wz.respostas;
      if (step.tipo !== 'opcoes') {
        const input = document.getElementById('wzInput');
        if (input) r[step.id] = input.value.trim();
      }
      if (!step.opcional && !r[step.id]) {
        const input = document.getElementById('wzInput');
        if (input) { input.style.borderColor='#EF4444'; input.focus(); }
        return;
      }
      wz.passos = wz.tipo === 'lp' ? passosFiltradosLP(r) : passosFiltrados(r);
      if (wz.stepIdx >= wz.passos.length - 1) { concluirWizard(); return; }
      wz.stepIdx++;
      renderStep();
    }

    function etapaAnterior() {
      if (wz.stepIdx <= 0) return;
      wz.stepIdx--;
      renderStep();
    }

    function concluirWizard() {
      const leads = getLeads();
      const idx   = leads.findIndex(l => l.id === wz.leadId);
      if (idx === -1) return;
      const isLP = wz.tipo === 'lp';
      const diag = { completo:true, data:new Date().toISOString(), respostas:wz.respostas, categorias: isLP ? categorizarLP(wz.respostas) : categorizar(wz.respostas) };
      leads[idx].diagnostico = diag;
      setLeads(leads);
      if (isLP) renderLPResumo(leads[idx]);
      else renderResumo(leads[idx]);
    }

    // ── CATEGORIZAÇÃO ────────────────────────────────────────────────────────
    function categorizar(r) {
      const c = {};
      // GMB — completude derivada dos campos individuais
      if (r.gmb_existe === 'Não') {
        c.gmb = 'critico';
      } else {
        const faltas = [
          r.gmb_foto === 'Não tem fotos',
          r.gmb_horario === 'Não',
          r.gmb_descricao === 'Não tem',
          r.gmb_verificado === 'Não',
        ].filter(Boolean).length;
        c.gmb = faltas === 0 ? 'bom' : faltas <= 2 ? 'atencao' : 'critico';
      }
      // Avaliações
      if (r.gmb_existe === 'Não') { c.avaliacoes = 'critico'; }
      else { const n = parseInt(r.gmb_avaliacoes)||0; c.avaliacoes = n<=5?'critico':n<=20?'atencao':'bom'; }
      // Nota
      if (r.gmb_existe === 'Não') { c.nota = 'critico'; }
      else { const n = parseFloat(r.gmb_nota)||0; c.nota = n===0?'critico':n<4.0?'critico':n<4.5?'atencao':'bom'; }
      // Posição — campo local_pack
      if (r.local_pack === 'Sim, no top 3')           c.posicao = 'bom';
      else if (r.local_pack === 'Aparece, mas fora do top 3') c.posicao = 'atencao';
      else                                              c.posicao = 'critico';
      // Site
      if (r.site_existe === 'Não')                     c.site = 'critico';
      else if (r.site_mobile === 'Sim, funciona bem')  c.site = 'bom';
      else if (r.site_mobile === 'Tem problemas no celular') c.site = 'atencao';
      else                                              c.site = 'critico';
      return c;
    }

    const CAT = { bom:'✓ Bom', atencao:'⚠ Atenção', critico:'✕ Crítico' };
    const CAT_COR = { bom:'#22C55E', atencao:'#F59E0B', critico:'#EF4444' };

    function lGmb(r) {
      if (r.gmb_existe === 'Não') return 'Inexistente';
      const faltas = [r.gmb_foto==='Não tem fotos', r.gmb_horario==='Não', r.gmb_descricao==='Não tem', r.gmb_verificado==='Não'].filter(Boolean).length;
      return faltas === 0 ? 'Perfil completo' : faltas <= 2 ? 'Perfil parcial' : 'Perfil básico';
    }
    function lPos(r)  { return r.local_pack||'—'; }
    function lSite(r) { return r.site_existe==='Não' ? 'Sem site' : (r.site_mobile||'Tem site'); }
    function lAval(r) { return r.gmb_existe==='Não' ? '0 avaliações' : `${r.gmb_avaliacoes||0} avaliações · nota ${r.gmb_nota||'—'}`; }

    // ── RESUMO ───────────────────────────────────────────────────────────────
    function renderResumo(lead) {
      const d = lead.diagnostico;
      const r = d.respostas;
      const cats = d.categorias;
      const volume   = parseInt(r.volume_busca)||0;
      const concNome = r.concorrente_nome||'não identificado';
      const concAval = r.concorrente_aval||'—';
      const data     = new Date(d.data).toLocaleDateString('pt-BR');

      const cards = [
        { titulo:'Google Meu Negócio', valor:lGmb(r),  cat:cats.gmb },
        { titulo:'Posição no Google',  valor:lPos(r),  cat:cats.posicao },
        { titulo:'Site',               valor:lSite(r), cat:cats.site },
        { titulo:'Avaliações',         valor:lAval(r), cat:cats.avaliacoes },
      ];

      const cardsHTML = cards.map(c => `
        <div class="resumo-card ${c.cat}">
          <div class="resumo-card-titulo">${c.titulo}</div>
          <div class="resumo-card-valor">${CAT[c.cat]} — ${c.valor}</div>
        </div>`).join('');

      document.getElementById('wizardConteudo').innerHTML = `
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:0.75rem">
          <div class="modal-titulo">📊 Resumo do Diagnóstico</div>
          <button class="btn btn-secundario btn-sm" onclick="fecharWizard()">✕</button>
        </div>
        <div style="font-size:0.78rem;color:var(--cinza);margin-bottom:1rem">${lead.nome} · ${data}</div>
        <div class="resumo-grid">${cardsHTML}</div>
        <div class="resumo-oportunidade">
          <div class="resumo-oportunidade-label">Oportunidade de mercado</div>
          <div class="resumo-oportunidade-valor">${volume>0 ? volume.toLocaleString('pt-BR')+' buscas/mês' : 'Volume não informado'}</div>
          <div class="resumo-concorrente">Concorrente em 1º: ${concNome} · ${concAval} avaliações</div>
        </div>

          <button class="btn btn-primario" onclick="gerarRelatorio('${lead.id}')">📄 Gerar Relatório PDF</button>

    function reeditarWizard(leadId) {
      const lead = getLeads().find(l => l.id === leadId);

    function marcarFechou(leadId) {
      const leads = getLeads();

    // ── GERADOR DE RELATÓRIO ─────────────────────────────────────────────────

    function calcScore(r) {
      let pts = 0;
      // GMB (0-3)
      if (r.gmb_existe !== 'Não') {
        const faltas = [r.gmb_foto==='Não tem fotos', r.gmb_horario==='Não', r.gmb_descricao==='Não tem', r.gmb_verificado==='Não'].filter(Boolean).length;
        pts += faltas === 0 ? 3 : faltas <= 2 ? 2 : 1;
      }
      // Avaliações (0-2)
      if (r.gmb_existe !== 'Não') {
        const n = parseInt(r.gmb_avaliacoes)||0;
        pts += n > 20 ? 2 : n > 5 ? 1 : 0;
      }
      // Nota (0-2)
      if (r.gmb_existe !== 'Não' && r.gmb_nota) {
        const n = parseFloat(r.gmb_nota)||0;
        pts += n >= 4.5 ? 2 : n >= 4.0 ? 1 : 0;
      }
      // Posição (0-2)
      if (r.local_pack === 'Sim, no top 3') pts += 2;
      else if (r.local_pack === 'Aparece, mas fora do top 3') pts += 1;
      // Site (0-2)
      if (r.site_existe !== 'Não') {
        pts += r.site_mobile === 'Sim, funciona bem' ? 2 : 1;
      }
      const atual = Math.round((pts / 11) * 10);
      const potencial = Math.min(10, Math.max(8, atual + 4));
      return { atual, potencial };
    }

    function gerarTextoDor(lead, r, cats, volume, concNome, concAval) {
      const nome   = lead.nome;
      const locStr = lead.cidade ? 'em ' + lead.cidade : 'na região';
      const volStr = volume > 0 ? volume.toLocaleString('pt-BR') + ' pessoas buscam por isso ' + locStr + ' todo mês' : 'pessoas buscam por esse tipo de negócio ' + locStr + ' todo mês';
      const concStr = concNome !== 'não identificado'
        ? concNome + ' aparece em 1º lugar' + (concAval !== '—' ? ' com ' + concAval + ' avaliações' : '')
        : 'o concorrente aparece na frente';
      const criticos = Object.entries(cats).filter(([,v]) => v === 'critico').map(([k]) => k);

      if (criticos.includes('gmb') && r.gmb_existe === 'Não') {
        return volStr + ' — prontas para comprar. Sem perfil no Google Maps, <strong>' + nome + '</strong> é invisível para todas elas. ' + concStr + ' e recebe esses clientes no lugar.';
      }
      if (criticos.includes('posicao') && criticos.includes('gmb')) {
        return '<strong>' + nome + '</strong> não aparece nas buscas e o perfil no Google está incompleto. ' + concStr + '. Para quem pesquisa no celular agora, ' + nome + ' simplesmente não existe.' + (volume > 0 ? ' São ' + volume.toLocaleString('pt-BR') + ' oportunidades mensais indo embora.' : '');
      }
      if (criticos.includes('posicao')) {
        return '<strong>' + nome + '</strong> não aparece no top 3 do Google enquanto ' + concStr + '. Quem pesquisa ' + locStr + ' raramente passa da primeira tela — e hoje, ' + nome + ' não está nela.' + (volume > 0 ? ' São ' + volume.toLocaleString('pt-BR') + ' buscas por mês que vão para quem aparece primeiro.' : '');
      }
      if (criticos.includes('site') && r.site_existe === 'Não') {
        return 'Mesmo quando alguém encontra <strong>' + nome + '</strong> no Google, não tem site para converter a visita em contato. O cliente pesquisa, não encontra como falar — e vai para o próximo resultado.' + (volume > 0 ? ' São ' + volume.toLocaleString('pt-BR') + ' oportunidades mensais que evaporam antes de virar uma ligação.' : '');
      }
      if (criticos.includes('avaliacoes')) {
        const nAval = parseInt(r.gmb_avaliacoes||0);
        return 'Com ' + nAval + ' avaliação' + (nAval === 1 ? '' : 'ões') + ' no Google, <strong>' + nome + '</strong> perde para concorrentes com mais histórico. ' + concStr + '. Sem prova social, o cliente escolhe o mais seguro — e seguro é quem aparece com mais avaliações.';
      }
      return '<strong>' + nome + '</strong> tem presença online, mas há espaço real para crescer. ' + concStr + ' e quem estruturar melhor fica com as posições de destaque.' + (volume > 0 ? ' São ' + volume.toLocaleString('pt-BR') + ' buscas mensais ' + locStr + ' — e cada posição a mais significa mais clientes.' : '');
    }

    async function carregarLogoBase64() {
      try {
        const resp = await fetch('../../identidade/logo.png');
        if (!resp.ok) return null;
        const blob = await resp.blob();
        return await new Promise(res => {
          const reader = new FileReader();
          reader.onload  = e => res(e.target.result);
          reader.onerror = () => res(null);
          reader.readAsDataURL(blob);
        });
      } catch { return null; }
    }

    // ══════════════════════════════════════════════════════════════════════════
    // LP — CATEGORIZAÇÃO E SCORE
    // ══════════════════════════════════════════════════════════════════════════

    function categorizarLP(r) {
      const c = {};
      const hero = [r.lp_hero_headline==='Sim, muito bem — foca no cliente', r.lp_hero_sub==='Sim, complementa bem', r.lp_hero_cta==='Sim, visível e com texto específico'].filter(Boolean).length;
      c.hero = hero===3?'bom':hero>=2?'atencao':'critico';

      const dorSol = [r.lp_dor_existe==='Sim, bem descrita e específica', r.lp_solucao_existe==='Sim', r.lp_beneficios==='Focado em benefícios concretos'].filter(Boolean).length;
      c.dor_solucao = dorSol>=2?'bom':dorSol>=1?'atencao':'critico';

      const social = [r.lp_depoi_existe==='Sim, com foto, nome real e resultado específico', r.lp_numeros_prova==='Sim, números concretos', r.lp_sobre==='Sim, bem feita e com credenciais reais'].filter(Boolean).length;
      c.prova_social = social>=2?'bom':social>=1?'atencao':'critico';

      const oferta = [r.lp_oferta_detalhe==='Sim, detalhado item por item', r.lp_preco==='Sim, claramente', r.lp_garantia==='Sim, com prazo e condições claras (ex: 7 ou 30 dias)'].filter(Boolean).length;
      c.oferta = oferta>=3?'bom':oferta>=2?'atencao':'critico';

      const conv = [r.lp_cta_final==='Sim, específico e visível', r.lp_cta_distribuido==='Sim, em vários pontos estratégicos', r.lp_faq==='Sim, responde bem as objeções reais'].filter(Boolean).length;
      c.conversao = conv>=2?'bom':conv>=1?'atencao':'critico';

      return c;
    }

    function calcScoreLP(r) {
      let pts = 0;
      if (r.lp_hero_headline==='Sim, muito bem — foca no cliente')                          pts++;
      if (r.lp_hero_sub==='Sim, complementa bem')                                           pts++;
      if (r.lp_hero_cta==='Sim, visível e com texto específico')                            pts++;
      if (r.lp_dor_existe==='Sim, bem descrita e específica')                               pts++;
      if (r.lp_beneficios==='Focado em benefícios concretos')                               pts++;
      if (r.lp_depoi_existe==='Sim, com foto, nome real e resultado específico')            pts++;
      if (r.lp_numeros_prova==='Sim, números concretos')                                    pts++;
      if (r.lp_sobre==='Sim, bem feita e com credenciais reais')                            pts++;
      if (r.lp_oferta_detalhe==='Sim, detalhado item por item')                             pts++;
      if (r.lp_preco==='Sim, claramente')                                                   pts++;
      if (r.lp_garantia==='Sim, com prazo e condições claras (ex: 7 ou 30 dias)')           pts++;
      if (r.lp_cta_final==='Sim, específico e visível')                                    pts++;
      const atual = Math.round((pts / 12) * 10);
      return { atual, potencial: Math.min(10, Math.max(8, atual + 3)) };
    }

    function lHero(r) {
      if (r.lp_hero_headline==='Sim, muito bem — foca no cliente' && r.lp_hero_cta==='Sim, visível e com texto específico') return 'Forte — foca no cliente';
      if (r.lp_hero_headline==='Não — fala do produto ou da empresa') return 'Fraco — não foca no cliente';
      return 'Parcial — pode ser mais direto';
    }
    function lDorSolucao(r) {
      if (r.lp_dor_existe==='Sim, bem descrita e específica' && r.lp_beneficios==='Focado em benefícios concretos') return 'Dor + benefícios conectados';
      if (r.lp_dor_existe==='Não tem — vai direto para a solução') return 'Sem seção de problema';
      return 'Presente mas pode ser mais específico';
    }
    function lProvaSocial(r) {
      if (r.lp_depoi_existe==='Sim, com foto, nome real e resultado específico') return 'Prova sólida e específica';
      if (r.lp_depoi_existe==='Não tem') return 'Sem prova social';
      return 'Prova fraca ou genérica';
    }
    function lOfertaLP(r) {
      if (r.lp_preco==='Sim, claramente' && r.lp_garantia==='Sim, com prazo e condições claras (ex: 7 ou 30 dias)') return 'Clara, com preço e garantia';
      if (r.lp_preco==='Não está na página') return 'Preço oculto';
      return 'Incompleta — falta detalhe ou garantia';
    }
    function lConversaoLP(r) {
      if (r.lp_cta_final==='Sim, específico e visível' && r.lp_faq==='Sim, responde bem as objeções reais') return 'CTA + FAQ eficazes';
      if (r.lp_cta_final==='Não tem CTA no final') return 'Sem CTA ao final';
      return 'CTAs ou FAQ podem melhorar';
    }

    function gerarRecomendacoesLP(r, cats) {
      const criticos = [], atencoes = [], bons = [];

      if (cats.hero==='critico') criticos.push('Hero fraco — headline não foca no cliente ou CTA ausente acima da dobra');
      else if (cats.hero==='atencao') atencoes.push('Fortalecer hero: headline mais específica ou CTA com texto de ação claro');
      else bons.push('Hero bem estruturado — headline + CTA visíveis');

      if (cats.dor_solucao==='critico') criticos.push('Sem seção de problema — a página não gera identificação antes de tentar vender');
      else if (cats.dor_solucao==='atencao') atencoes.push('Aprofundar a dor do cliente e garantir que a solução foca em benefícios, não só features');
      else bons.push('Problema e solução bem conectados com foco nos benefícios');

      if (cats.prova_social==='critico') criticos.push('Sem prova social real — visitante não tem razão para confiar antes de comprar');
      else if (cats.prova_social==='atencao') atencoes.push('Substituir depoimentos anônimos por testemunhos com foto, nome e resultado específico');
      else bons.push('Prova social presente com depoimentos e números reais');

      if (cats.oferta==='critico') criticos.push('Oferta pouco clara — preço escondido ou sem garantia afastam quem estava quase comprando');
      else if (cats.oferta==='atencao') atencoes.push('Detalhar o que está incluso, tornar o preço visível e adicionar garantia com prazo definido');
      else bons.push('Oferta clara com preço visível, entregáveis e garantia');

      if (cats.conversao==='critico') criticos.push('Falta CTA claro ao final e FAQ para responder objeções — visitante sai sem saber o que fazer');
      else if (cats.conversao==='atencao') atencoes.push('Adicionar FAQ com objeções reais e tornar CTAs mais específicos ao longo da página');
      else bons.push('Conversão bem estruturada com CTAs e FAQ eficazes');

      let html = '';
      if (criticos.length > 0) html += `<div style="background:rgba(239,68,68,0.08);border-left:3px solid #EF4444;border-radius:0 4px 4px 0;padding:0.65rem 0.85rem;margin-bottom:0.45rem"><div style="font-size:0.6rem;text-transform:uppercase;letter-spacing:0.5px;color:#EF4444;font-weight:700;margin-bottom:0.3rem">Problemas críticos</div>${criticos.map(p=>`<div style="font-size:0.78rem;color:rgba(248,245,240,0.85);padding:0.15rem 0;line-height:1.4">✕ ${p}</div>`).join('')}</div>`;
      if (atencoes.length > 0) html += `<div style="background:rgba(245,158,11,0.08);border-left:3px solid #F59E0B;border-radius:0 4px 4px 0;padding:0.65rem 0.85rem;margin-bottom:0.45rem"><div style="font-size:0.6rem;text-transform:uppercase;letter-spacing:0.5px;color:#F59E0B;font-weight:700;margin-bottom:0.3rem">Pontos de atenção</div>${atencoes.map(p=>`<div style="font-size:0.78rem;color:rgba(248,245,240,0.85);padding:0.15rem 0;line-height:1.4">⚠ ${p}</div>`).join('')}</div>`;
      if (bons.length > 0) html += `<div style="background:rgba(34,197,94,0.08);border-left:3px solid #22C55E;border-radius:0 4px 4px 0;padding:0.65rem 0.85rem;margin-bottom:0.45rem"><div style="font-size:0.6rem;text-transform:uppercase;letter-spacing:0.5px;color:#22C55E;font-weight:700;margin-bottom:0.3rem">O que está bom</div>${bons.map(p=>`<div style="font-size:0.78rem;color:rgba(248,245,240,0.85);padding:0.15rem 0;line-height:1.4">✓ ${p}</div>`).join('')}</div>`;
      if (r.lp_maior_gap) html += `<div style="background:rgba(212,175,55,0.08);border:1px solid rgba(212,175,55,0.25);border-radius:4px;padding:0.65rem 0.85rem;margin-top:0.1rem"><div style="font-size:0.6rem;text-transform:uppercase;letter-spacing:0.5px;color:var(--dourado);font-weight:700;margin-bottom:0.25rem">Sua avaliação</div><div style="font-size:0.78rem;color:rgba(248,245,240,0.85);line-height:1.5">${r.lp_maior_gap}</div></div>`;
      return html;
    }

    // ── LP — RESUMO ───────────────────────────────────────────────────────────
