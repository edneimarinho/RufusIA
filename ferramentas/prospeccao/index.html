        <div style="font-size:0.78rem;color:var(--cinza);margin-bottom:1rem">${lead.nome}${r.lp_oferta ? ' · '+r.lp_oferta : ''} · ${data}</div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:0.4rem;margin-bottom:0.65rem">${cardsHTML}</div>
        <div style="background:rgba(212,175,55,0.1);border:1px solid rgba(212,175,55,0.3);border-radius:4px;padding:0.65rem 0.9rem;margin-bottom:0.65rem">
          <div style="font-size:0.6rem;text-transform:uppercase;letter-spacing:0.5px;color:var(--dourado);margin-bottom:0.5rem;font-weight:700">Score geral da página — 0 a 10</div>
          <div style="display:flex;align-items:center;gap:0.85rem">
            <div style="text-align:center;min-width:32px"><div style="font-size:1.75rem;font-weight:900;color:${scoreCor};line-height:1">${score.atual}</div><div style="font-size:0.6rem;color:var(--cinza)">atual</div></div>
            <div style="flex:1">
              <div style="font-size:0.6rem;color:var(--cinza);margin-bottom:0.2rem">Página atual</div>
              <div style="display:flex;gap:2px;margin-bottom:0.4rem">${scoreBarAt}</div>
              <div style="font-size:0.6rem;color:var(--cinza);margin-bottom:0.2rem">Com as melhorias</div>
              <div style="display:flex;gap:2px">${scoreBarPot}</div>
            </div>
            <div style="text-align:center;min-width:32px"><div style="font-size:1.75rem;font-weight:900;color:#22C55E;line-height:1">${score.potencial}</div><div style="font-size:0.6rem;color:var(--cinza)">potencial</div></div>
          </div>
        </div>
        ${gerarRecomendacoesLP(r, cats)}
        <div class="resumo-acoes">
          <button class="btn btn-primario" onclick="gerarRelatorioLP('${lead.id}')">📄 Gerar Relatório</button>
          <button class="btn btn-secundario" onclick="reeditarWizard('${lead.id}')">✏️ Editar respostas</button>
          <button class="btn-fechou" onclick="marcarFechou('${lead.id}')">✓ Prospect fechou! → Ir para Entregas</button>
          <button class="btn btn-secundario" onclick="fecharWizard()">Fechar</button>
        </div>`;
    }

    // ── LP — RELATÓRIO PDF ────────────────────────────────────────────────────
    async function gerarRelatorioLP(leadId) {
      const lead = getLeads().find(l => l.id === leadId);
      if (!lead?.diagnostico) return;

      const d    = lead.diagnostico;
      const r    = d.respostas;
      const cats = d.categorias;
      const data = new Date(d.data).toLocaleDateString('pt-BR');
      const score = calcScoreLP(r);
      const logoB64 = await carregarLogoBase64();
      const scoreCor = score.atual<=3?'#EF4444':score.atual<=6?'#F59E0B':'#22C55E';

      const scoreBarAt  = Array.from({length:10},(_,i)=>`<div style="flex:1;height:8px;border-radius:2px;background:${i<score.atual?scoreCor:'rgba(248,245,240,0.18)'}"></div>`).join('');
      const scoreBarPot = Array.from({length:10},(_,i)=>`<div style="flex:1;height:8px;border-radius:2px;background:${i<score.potencial?'#22C55E':'rgba(248,245,240,0.18)'}"></div>`).join('');

      const cardsRel = [
        { titulo:'HERO / ACIMA DA DOBRA', valor:lHero(r),        cat:cats.hero },
        { titulo:'DOR + SOLUÇÃO',         valor:lDorSolucao(r),  cat:cats.dor_solucao },
        { titulo:'PROVA SOCIAL',          valor:lProvaSocial(r), cat:cats.prova_social },
        { titulo:'OFERTA',                valor:lOfertaLP(r),    cat:cats.oferta },
        { titulo:'CONVERSÃO',             valor:lConversaoLP(r), cat:cats.conversao },
      ].map(c=>`<div style="background:#064420;border-radius:6px;padding:0.75rem;border-left:4px solid ${CAT_COR[c.cat]}"><div style="font-size:0.6rem;text-transform:uppercase;letter-spacing:0.5px;color:#888;margin-bottom:0.2rem">${c.titulo}</div><div style="font-size:0.7rem;font-weight:700;color:${CAT_COR[c.cat]};margin-bottom:0.15rem">${CAT[c.cat].toUpperCase()}</div><div style="font-size:0.8rem;color:#F8F5F0">${c.valor}</div></div>`).join('');

      const recomHTML = (()=>{
        const rows = [];
        if (cats.hero==='critico') rows.push({tipo:'critico',txt:'Hero fraco — headline não foca no cliente ou CTA ausente acima da dobra'});
        else if (cats.hero==='atencao') rows.push({tipo:'atencao',txt:'Fortalecer hero: headline mais específica ou CTA com texto de ação claro'});
        if (cats.dor_solucao==='critico') rows.push({tipo:'critico',txt:'Sem seção de problema — página não gera identificação antes de tentar vender'});
        else if (cats.dor_solucao==='atencao') rows.push({tipo:'atencao',txt:'Aprofundar a dor do cliente e garantir que a solução foca em benefícios'});
        if (cats.prova_social==='critico') rows.push({tipo:'critico',txt:'Sem prova social — visitante não tem razão para confiar antes de comprar'});
        else if (cats.prova_social==='atencao') rows.push({tipo:'atencao',txt:'Adicionar depoimentos com foto e nome para aumentar credibilidade'});
        if (cats.oferta==='critico') rows.push({tipo:'critico',txt:'Oferta pouco clara — preço escondido ou ausência de garantia reduzem conversão'});
        else if (cats.oferta==='atencao') rows.push({tipo:'atencao',txt:'Detalhar entregáveis e garantia com prazo definido'});
        if (cats.conversao==='critico') rows.push({tipo:'critico',txt:'Fluxo ou CTAs confusos — visitante não sabe qual é o próximo passo'});
        else if (cats.conversao==='atencao') rows.push({tipo:'atencao',txt:'Tornar CTAs mais específicos e revisar a estrutura da página'});
        return rows.map(row=>`<tr><td style="padding:0.5rem 0.75rem;border-bottom:1px solid #eee;font-size:0.78rem;width:12px;text-align:center;color:${row.tipo==='critico'?'#EF4444':'#F59E0B'}">${row.tipo==='critico'?'✕':'⚠'}</td><td style="padding:0.5rem 0.75rem;border-bottom:1px solid #eee;font-size:0.78rem;color:#333">${row.txt}</td></tr>`).join('');
      })();

      const logoHTML = logoB64 ? `<img src="${logoB64}" style="height:48px;opacity:0.95"/>` : `<div style="font-size:0.78rem;font-weight:700;color:#D4AF37;letter-spacing:1px">ATITUDE E PROGRESSO</div>`;

      const html = `<!DOCTYPE html>
<html lang="pt-BR"><head><meta charset="UTF-8"/>
<title>Análise LP — ${lead.nome}</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',sans-serif;background:#fff;color:#1C1C1C;font-weight:300}
@page{size:A4 portrait;margin:0}
.pg{width:210mm;margin:0 auto;padding:10mm 15mm 10mm;page-break-after:always;break-after:page}
.pg:last-child{page-break-after:auto;break-after:auto}
.pg-ft{margin-top:1.2rem;border-top:1px solid #ddd;padding-top:0.4rem;display:flex;align-items:center;justify-content:space-between}
.print-btn{position:fixed;top:1rem;right:1rem;background:#D4AF37;color:#111;border:none;padding:0.6rem 1.2rem;border-radius:4px;font-size:0.85rem;font-weight:700;font-family:'Inter',sans-serif;cursor:pointer;z-index:99}
@media print{.print-btn{display:none}body{-webkit-print-color-adjust:exact;print-color-adjust:exact}}
</style></head><body>
<button class="print-btn" id="printBtn">🖨 Imprimir / Salvar PDF</button>
<scr` + `ipt>window.addEventListener('load',function(){document.getElementById('printBtn').addEventListener('click',function(){window.focus();setTimeout(function(){window.print();},100);});});</scr` + `ipt>

<!-- PÁGINA 1 — CAPA -->
<div class="pg">
  <div style="border-top:4px solid #D4AF37;padding-top:2rem">
    <div style="font-size:0.72rem;text-transform:uppercase;letter-spacing:2px;color:#888;margin-bottom:0.75rem">Atitude e Progresso</div>
    <div style="font-size:3.5rem;font-weight:900;line-height:1;color:#1C1C1C;margin-bottom:0.5rem">ANÁLISE</div>
    <div style="font-size:1.75rem;font-weight:700;color:#064420;margin-bottom:2.5rem">LANDING PAGE / PÁGINA DE VENDAS</div>
    <div style="width:80px;height:3px;background:#D4AF37;margin-bottom:2rem"></div>
    <div style="background:#064420;border-radius:6px;padding:1.25rem 1.5rem;margin-bottom:1rem">
      <div style="font-size:2rem;font-weight:900;color:#D4AF37;line-height:1.15">${lead.nome}</div>
      ${r.lp_oferta?`<div style="font-size:0.88rem;color:#F8F5F0;margin-top:0.4rem">Oferta analisada: ${r.lp_oferta}</div>`:''}
      ${r.lp_url?`<div style="font-size:0.75rem;color:#888;margin-top:0.3rem">${r.lp_url}</div>`:''}
      <div style="font-size:0.72rem;color:#888;margin-top:0.4rem">Análise realizada em ${data}</div>
    </div>
  </div>
  <div class="pg-ft">${logoHTML}<div style="text-align:right"><div style="font-size:0.65rem;color:#999">Ednei Marinho</div><div style="font-size:0.65rem;color:#999">${data}</div></div></div>
</div>

<!-- PÁGINA 2 — SCORE E DIAGNÓSTICO -->
<div class="pg">
  <div style="border-top:4px solid #D4AF37;padding-top:1rem;margin-bottom:0.75rem">
    <div style="font-size:1.3rem;font-weight:700;color:#1C1C1C">Diagnóstico completo</div>
    <div style="font-size:0.82rem;color:#888;margin-top:0.15rem">${lead.nome}</div>
  </div>

  <div style="display:grid;grid-template-columns:1fr 1fr;gap:0.45rem;margin-bottom:0.65rem">${cardsRel}</div>

  <div style="background:#064420;border-radius:8px;padding:0.8rem 1rem;margin-bottom:0.65rem">
    <div style="font-size:0.6rem;text-transform:uppercase;letter-spacing:1px;color:#D4AF37;margin-bottom:0.5rem;font-weight:600">Score geral — escala de 0 a 10</div>
    <div style="display:flex;align-items:center;gap:1rem">
      <div style="text-align:center;min-width:36px"><div style="font-size:2rem;font-weight:900;color:${scoreCor};line-height:1">${score.atual}</div><div style="font-size:0.58rem;color:rgba(248,245,240,0.55)">hoje</div></div>
      <div style="flex:1">
        <div style="font-size:0.6rem;color:rgba(248,245,240,0.55);margin-bottom:0.25rem">Página atual</div>
        <div style="display:flex;gap:2px;margin-bottom:0.5rem">${scoreBarAt}</div>
        <div style="font-size:0.6rem;color:rgba(248,245,240,0.55);margin-bottom:0.25rem">Com as melhorias</div>
        <div style="display:flex;gap:2px">${scoreBarPot}</div>
      </div>
      <div style="text-align:center;min-width:36px"><div style="font-size:2rem;font-weight:900;color:#22C55E;line-height:1">${score.potencial}</div><div style="font-size:0.58rem;color:rgba(248,245,240,0.55)">potencial</div></div>
    </div>
  </div>

  <div style="margin-bottom:0.5rem">
    <div style="font-size:0.7rem;font-weight:700;color:#1C1C1C;margin-bottom:0.5rem;text-transform:uppercase;letter-spacing:0.5px">O que precisa melhorar</div>
    <table style="width:100%;border-collapse:collapse;border:1px solid #eee;border-radius:4px;overflow:hidden">
      <tbody>${recomHTML || '<tr><td colspan="2" style="padding:0.75rem;font-size:0.78rem;color:#888;text-align:center">Nenhum problema crítico identificado</td></tr>'}</tbody>
    </table>
  </div>

  ${r.lp_maior_gap?`<div style="background:#f9f5e8;border-left:4px solid #D4AF37;border-radius:0 6px 6px 0;padding:0.65rem 0.85rem"><div style="font-size:0.6rem;text-transform:uppercase;letter-spacing:0.5px;color:#888;font-weight:700;margin-bottom:0.25rem">Avaliação do analista</div><div style="font-size:0.82rem;color:#333;line-height:1.55">${r.lp_maior_gap}</div></div>`:''}

  <div class="pg-ft"><div style="font-size:0.65rem;color:#999">Ednei Marinho · Atitude e Progresso</div><div style="font-size:0.65rem;color:#999">${data}</div></div>
</div>

</body></html>`;

      const blob = new Blob([html], { type: 'text/html;charset=utf-8' });
      const url  = URL.createObjectURL(blob);
      const win  = window.open(url, '_blank');
      if (win) setTimeout(() => URL.revokeObjectURL(url), 60000);
    }

    // ── INIT ──────────────────────────────────────────────────────────────────
    inicializar();
  </script>
</body>
</html>
