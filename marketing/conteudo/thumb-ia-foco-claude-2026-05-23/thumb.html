<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <title>Thumb — Aprenda uma IA antes de aprender todas</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 1280px;
      height: 720px;
      overflow: hidden;
      background: #064420;
      font-family: 'Inter', sans-serif;
      position: relative;
    }

    /* FOTO — ocupa metade esquerda como background */
    .foto {
      position: absolute;
      left: 0;
      top: 0;
      width: 580px;
      height: 720px;
      overflow: hidden;
      z-index: 1;
    }

    .foto img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center top;
      /* browsers modernos respeitam EXIF automaticamente */
    }

    /* fade à direita da foto pra fundir com o fundo */
    .foto::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(to right, transparent 50%, #064420 95%);
      z-index: 2;
    }

    /* fade na base da foto */
    .foto::before {
      content: '';
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 180px;
      background: linear-gradient(to top, #064420 0%, transparent 100%);
      z-index: 2;
    }

    /* LADO DIREITO — texto */
    .conteudo {
      position: absolute;
      right: 50px;
      top: 50%;
      transform: translateY(-50%);
      width: 580px;
      z-index: 10;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    /* Badge */
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(212, 175, 55, 0.15);
      border: 1px solid rgba(212, 175, 55, 0.5);
      border-radius: 4px;
      padding: 6px 14px;
      width: fit-content;
    }

    .badge-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #D4AF37;
      flex-shrink: 0;
    }

    .badge span {
      font-size: 12px;
      font-weight: 700;
      color: #D4AF37;
      letter-spacing: 2.5px;
      text-transform: uppercase;
    }

    /* Título principal */
    .titulo {
      display: flex;
      flex-direction: column;
      gap: 0;
    }

    .linha-grande {
      font-size: 100px;
      font-weight: 900;
      line-height: 0.88;
      text-transform: uppercase;
      letter-spacing: -3px;
      color: #F8F5F0;
    }

    .linha-grande.dourado {
      color: #D4AF37;
    }

    .linha-pequena {
      font-size: 30px;
      font-weight: 700;
      color: rgba(248, 245, 240, 0.65);
      text-transform: uppercase;
      letter-spacing: 2px;
      margin-top: 10px;
      line-height: 1.2;
    }

    /* Divisor */
    .divisor {
      width: 55px;
      height: 3px;
      background: #D4AF37;
      border-radius: 2px;
    }

    /* Bloco Claude */
    .ferramenta {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .claude-icone {
      width: 54px;
      height: 54px;
      background: #D4AF37;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 26px;
      font-weight: 900;
      color: #064420;
      flex-shrink: 0;
      font-family: 'Inter', sans-serif;
    }

    .claude-texto {
      display: flex;
      flex-direction: column;
      line-height: 1.2;
    }

    .claude-texto .acima {
      font-size: 12px;
      font-weight: 400;
      color: rgba(248, 245, 240, 0.45);
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    .claude-texto .nome {
      font-size: 26px;
      font-weight: 900;
      color: #F8F5F0;
      letter-spacing: 1px;
    }
  </style>
</head>
<body>

  <!-- FOTO ESQUERDA -->
  <div class="foto">
    <img src="../../../identidade/IMG_8049.JPG" alt="Ednei Marinho" />
  </div>

  <!-- TEXTO DIREITA -->
  <div class="conteudo">

    <div class="badge">
      <div class="badge-dot"></div>
      <span>IA na prática</span>
    </div>

    <div class="titulo">
      <div class="linha-grande">APRENDA</div>
      <div class="linha-grande dourado">UMA IA</div>
      <div class="linha-grande">SÓ</div>
      <div class="linha-pequena">antes de aprender<br>todas as outras</div>
    </div>

    <div class="divisor"></div>

    <div class="ferramenta">
      <div class="claude-icone">C</div>
      <div class="claude-texto">
        <span class="acima">comece pelo</span>
        <span class="nome">Claude</span>
      </div>
    </div>

  </div>

</body>
</html>
