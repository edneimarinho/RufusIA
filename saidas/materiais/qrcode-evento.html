<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>QR Code — Ednei Marinho</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: #080e0b;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }

    .card {
      background: #F8F5F0;
      border-radius: 20px;
      padding: 40px 36px 32px;
      text-align: center;
      width: 320px;
      box-shadow: 0 0 60px rgba(212, 175, 55, 0.15);
    }

    .nome {
      font-size: 20px;
      font-weight: 700;
      color: #064420;
      letter-spacing: -0.3px;
    }

    .cargo {
      font-size: 13px;
      color: #555;
      margin-top: 4px;
      margin-bottom: 24px;
    }

    #qr {
      display: flex;
      justify-content: center;
      margin-bottom: 20px;
    }

    #qr img {
      border-radius: 8px;
      width: 200px;
      height: 200px;
    }

    .url {
      font-size: 12px;
      color: #888;
      margin-bottom: 20px;
      letter-spacing: 0.3px;
    }

    .divisor {
      height: 1px;
      background: #e0dcd6;
      margin-bottom: 16px;
    }

    .contato {
      font-size: 13px;
      color: #064420;
      font-weight: 500;
    }

    .instrucao {
      margin-top: 14px;
      font-size: 11px;
      color: #aaa;
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="nome">Ednei Marinho</div>
    <div class="cargo">Marketing Digital · IA · Funis de Venda</div>

    <div id="qr">
      <img
        src="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=https://www.atitudeeprogresso.com.br/links&color=064420&bgcolor=F8F5F0&margin=1"
        alt="QR Code"
      />
    </div>

    <div class="url">atitudeeprogresso.com.br/links</div>

    <div class="divisor"></div>

    <div class="contato">Aponta a câmera pro QR code</div>
    <div class="instrucao">Todos os meus links e formas de contato estão lá.</div>
  </div>

</body>
</html>
