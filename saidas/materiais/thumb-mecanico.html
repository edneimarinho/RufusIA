<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 1280px;
      height: 720px;
      overflow: hidden;
      font-family: 'Arial Black', 'Impact', Arial, sans-serif;
      position: relative;
      background: #050e07;
    }

    .bg {
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at 25% 50%, #0a5c2a 0%, #064420 45%, #020c05 100%);
    }

    /* Faixa dourada diagonal decorativa */
    .faixa {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: linear-gradient(135deg, rgba(212,175,55,0.06) 0%, transparent 50%);
      pointer-events: none;
    }

    .foto-wrap {
      position: absolute;
      right: 0;
      bottom: 0;
      width: 720px;
      height: 720px;
    }

    .foto {
      position: absolute;
      right: -20px;
      bottom: 0;
      height: 730px;
    }

    /* Gradiente que funde a foto no fundo verde */
    .foto-fade {
      position: absolute;
      inset: 0;
      background: linear-gradient(to right, #050e07 0%, #064420 15%, transparent 55%);
      z-index: 2;
    }

    /* Bloco de texto à esquerda */
    .texto {
      position: absolute;
      left: 64px;
      top: 50%;
      transform: translateY(-50%);
      z-index: 10;
    }

    .num {
      font-size: 210px;
      font-weight: 900;
      color: #D4AF37;
      line-height: 0.85;
      letter-spacing: -8px;
    }

    .minutos {
      font-size: 68px;
      font-weight: 900;
      color: #D4AF37;
      letter-spacing: 8px;
      margin-bottom: 20px;
    }

    .linha1 {
      font-size: 78px;
      font-weight: 900;
      color: #ffffff;
      text-transform: uppercase;
      line-height: 1;
    }

    .linha2 {
      font-size: 78px;
      font-weight: 900;
      color: #ffffff;
      text-transform: uppercase;
      line-height: 1;
      margin-bottom: 24px;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: #D4AF37;
      color: #052e15;
      font-size: 30px;
      font-weight: 900;
      padding: 10px 24px;
      border-radius: 8px;
      letter-spacing: 1px;
      text-transform: uppercase;
    }
  </style>
</head>
<body>
  <div class="bg"></div>
  <div class="faixa"></div>

  <div class="texto">
    <div class="num">40</div>
    <div class="minutos">MINUTOS</div>
    <div class="linha1">SITE DO</div>
    <div class="linha2">ZERO</div>
    <div class="badge">com Claude AI</div>
  </div>

  <div class="foto-wrap">
    <img class="foto" src="foto-thumb.png" alt="Ednei Marinho" />
    <div class="foto-fade"></div>
  </div>
</body>
</html>
